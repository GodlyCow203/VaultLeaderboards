# Database Configuration
database:
  enabled: false
  host: localhost
  port: 3306
  database: vaultleaderboards
  username: root
  password: "minecraft"
  table-prefix: "vl_"
  max-connections: 10
  connection-timeout: 5000
  ssl: false
  auto-reconnect: true

  # Cross-server synchronization
  sync:
    enabled: true
    interval-seconds: 30  # How often to sync with database

# Time Period Settings
time-periods:
  daily:
    # Time of day when daily leaderboard resets (24-hour format)
    # Example: "00:00" for midnight, "06:00" for 6 AM
    reset-time: "00:00"
    timezone: "UTC"
  
  weekly:
    # Day of week: MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY
    # Time when weekly leaderboard resets
    reset-day: "MONDAY"
    reset-time: "00:00"
    timezone: "UTC"
  
  monthly:
    # Day of month (1-31) when monthly leaderboard resets
    # If day doesn't exist (e.g., 31st from Feb), it resets on last day of month
    reset-day: 1
    reset-time: "00:00"
    timezone: "UTC"

# New placeholder configurations
placeholders:
  top: "<yellow><rank>. <green><player></green> - <aqua>$<balance>"
  player: "<yellow><player></yellow> is <green>#<rank></green> with <aqua>$<balance>"
  server-average: "<yellow>Server Average: <aqua>$<balance>"
  not-available: "<red>N/A</red>"
  top-earner: "<yellow><rank>. <green><player></green> +<aqua>$<amount></aqua> (<days>d)"
  
  # Daily/Weekly/Monthly top earner placeholders
  daily-top: "<yellow><rank>. <green><player></green> <aqua>+$<amount></aqua> (today)"
  weekly-top: "<yellow><rank>. <green><player></green> <aqua>+$<amount></aqua> (week)"
  monthly-top: "<yellow><rank>. <green><player></green> <aqua>+$<amount></aqua> (month)"

# Updated messages
messages:
  prefix: "<dark_gray>[<gold>VL</gold>]</dark_gray>"
  no-permission: "<red>You lack permission for this command.</red>"
  reload: "<green>Configuration reloaded!</green>"
  help:
    - "<gold>VaultLeaderboards Commands:"
    - "<yellow>/vl help <gray>- Show this help"
    - "<yellow>/vl reload <gray>- Reload configuration"
    - "<yellow>/vl version <gray>- Check for updates"
    - "<yellow>/vl status <gray>- Database connection status"
    - "<yellow>/vl sync <gray>- Force database synchronization"
    - "<yellow>/vl top [page] <gray>- Display top balances"
  version:
    available: "<yellow>New version available: <green><new-version></green>"
    download: "<aqua>Download: <url>"
    up-to-date: "<green>You are running the latest version!</green>"
    error: "<red>Failed to check for updates.</red>"

settings:
  debug: false
  refresh-interval: 60
  top-limit: 10
  check-updates: true
  notify-op-updates: true